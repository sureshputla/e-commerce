<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Products Store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Baby Products Store</h1>
      <p>Shop diapers, bottles, toys, vehicle toys, cradles, clothes and more.</p>
    </header>

    <main class="layout">
      <section class="panel filters">
        <h2>Filters</h2>
        <label>
          Category
          <select id="categoryFilter">
            <option value="all">All Categories</option>
          </select>
        </label>

        <label>
          Brand
          <select id="brandFilter">
            <option value="all">All Brands</option>
          </select>
        </label>

        <label>
          Max Price (₹)
          <input id="priceFilter" type="number" min="0" placeholder="No limit" />
        </label>

        <label>
          Search
          <input id="searchFilter" type="search" placeholder="Search products" />
        </label>
      </section>

      <section class="panel products">
        <h2>Products</h2>
        <div id="productList" class="product-list"></div>
      </section>

      <section class="panel side">
        <div>
          <h2>Wishlist</h2>
          <ul id="wishlistList"></ul>
        </div>

        <div>
          <h2>Cart</h2>
          <ul id="cartList"></ul>
          <p id="cartTotal">Total: ₹0</p>
        </div>

        <div>
          <h2>Payment Service</h2>
          <label>
            Method
            <select id="paymentMethod">
              <option value="card">Card</option>
              <option value="upi">UPI</option>
              <option value="cod">Cash on Delivery</option>
            </select>
          </label>
          <button id="checkoutButton">Pay Now</button>
          <p id="paymentStatus" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
