<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Baby Products Store</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css"/>
</head>
<body>
<header>
    <h1>Baby Products Store</h1>
    <p>Shop diapers, bottles, toys, vehicle toys, cradles, clothes and more.</p>
</header>

<main class="layout">
    <section class="panel filters">
        <h2>Filters</h2>
        <label>
            Category
            <select id="categoryFilter">
                <option value="all">All Categories</option>
            </select>
        </label>

        <label>
            Brand
            <select id="brandFilter">
                <option value="all">All Brands</option>
            </select>
        </label>

        <label>
            Max Price (₹)
            <input id="priceFilter" type="number" min="0" placeholder="No limit"/>
        </label>

        <label>
            Search
            <input id="searchFilter" type="search" placeholder="Search products"/>
        </label>
    </section>

    <section class="panel products">
        <h2>Products</h2>
        <div id="productList" class="product-list"></div>
    </section>

    <section class="panel side">
        <div>
            <h2>Wishlist</h2>
            <ul id="wishlistList"></ul>
        </div>

        <div>
            <h2>Cart</h2>
            <ul id="cartList"></ul>
            <p id="cartTotal">Total: ₹0</p>
        </div>

        <div>
            <h2>Checkout</h2>
            <label>
                Payment Method
                <select id="paymentMethod">
                    <option value="card">Card</option>
                    <option value="upi">UPI</option>
                    <option value="cod">Cash on Delivery</option>
                </select>
            </label>
            <button id="checkoutButton">Pay Now</button>
            <p id="paymentStatus" aria-live="polite"></p>
        </div>
    </section>
</main>

<!-- Inject the API Gateway URL from the server so JS doesn't hardcode it -->
<script th:inline="javascript">
    window.API_GATEWAY = /*[[${apiGatewayUrl}]]*/ 'http://localhost:8080';
</script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
