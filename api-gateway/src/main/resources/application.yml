spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Global CORS – allows the frontend (port 8090) to call the gateway (port 8080)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # ── Product Service ────────────────────────────────────
        - id: product-filters
          uri: lb://product-service
          predicates:
            - Path=/api/filters
          filters:
            - name: CircuitBreaker
              args:
                name: productCircuitBreaker
                fallbackUri: forward:/fallback/product

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: productCircuitBreaker
                fallbackUri: forward:/fallback/product

        # ── Cart Service ────────────────────────────────────────
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            - name: CircuitBreaker
              args:
                name: cartCircuitBreaker
                fallbackUri: forward:/fallback/cart

        # ── Wishlist Service ────────────────────────────────────
        - id: wishlist-service
          uri: lb://wishlist-service
          predicates:
            - Path=/api/wishlist/**
          filters:
            - name: CircuitBreaker
              args:
                name: wishlistCircuitBreaker
                fallbackUri: forward:/fallback/wishlist

        # ── Order Service (checkout + orders) ───────────────────
        - id: order-checkout
          uri: lb://order-service
          predicates:
            - Path=/api/checkout
          filters:
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/order

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/order

        # ── Payment Service ─────────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentCircuitBreaker
                fallbackUri: forward:/fallback/payment

        # ── Notification Service ────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationCircuitBreaker
                fallbackUri: forward:/fallback/notification

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Resilience4j circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      productCircuitBreaker:
        baseConfig: default
      cartCircuitBreaker:
        baseConfig: default
      wishlistCircuitBreaker:
        baseConfig: default
      orderCircuitBreaker:
        baseConfig: default
      paymentCircuitBreaker:
        baseConfig: default
      notificationCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      productCircuitBreaker:
        baseConfig: default
      cartCircuitBreaker:
        baseConfig: default
      wishlistCircuitBreaker:
        baseConfig: default
      orderCircuitBreaker:
        baseConfig: default
      paymentCircuitBreaker:
        baseConfig: default
      notificationCircuitBreaker:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO

